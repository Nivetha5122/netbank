# ─── Server ───────────────────────────────────────────────
server.port=8081
server.servlet.context-path=/netbank

# ─── Database ─────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/netbank_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ─── JSP View Resolver ────────────────────────────────────
spring.mvc.view.prefix=/WEB-INF/views/
spring.mvc.view.suffix=.jsp

# ─── Session ──────────────────────────────────────────────
server.servlet.session.timeout=30m

# ─── Logging ──────────────────────────────────────────────
logging.level.com.netbank=DEBUG
logging.level.org.springframework.security=DEBUG
